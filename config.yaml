name: "HA Config MCP"
description: "MCP Server for Home Assistant config file access with diff+approval and git commit/push"
version: "1.0.0"
slug: "ha_config_mcp"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

startup: services
boot: auto

map:
  - config:rw

ports:
  8765/tcp: 8765

ports_description:
  8765/tcp: "MCP Server SSE endpoint"

options:
  git_remote: "origin"
  git_branch: "main"
  git_user_name: "HA Config Bot"
  git_user_email: "ha-config@homeassistant.local"

schema:
  git_remote: str
  git_branch: str
  git_user_name: str
  git_user_email: str

panel_icon: mdi:file-code
panel_title: "HA Config MCP"
